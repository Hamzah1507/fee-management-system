<div class="add-wrapper">

  <div class="page-title">
    Add Student
  </div>

  <div class="form-card">

    <form [formGroup]="studentForm" (ngSubmit)="submit()">

      <div class="form-grid">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="name" placeholder="e.g. Ved Patel">
        </div>

        <div class="form-group">
          <label>Course</label>
          <input type="text" formControlName="course" placeholder="e.g. BCA">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="e.g. ved@gmail.com">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" formControlName="phone" placeholder="e.g. 9876543210">
        </div>

        <div class="form-group">
          <label>Semester</label>
          <input type="number" formControlName="semester" placeholder="e.g. 3">
        </div>

        <div class="form-group">
          <label>Due Date</label>
          <input type="date" formControlName="dueDate">
        </div>

        <div class="form-group">
          <label>Total Fees</label>
          <input type="number" formControlName="totalFees">
        </div>

        <div class="form-group">
          <label>Paid Amount</label>
          <input type="number" formControlName="paid">
        </div>

      </div>

      <div class="remaining-box">
        Remaining: ₹ {{ remaining }}
      </div>

      <button type="submit" [disabled]="loading" class="submit-btn">
        <span *ngIf="!loading">Add Student</span>
        <span *ngIf="loading" class="loader"></span>
      </button>

      <div class="success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

    </form>

  </div>

</div>
