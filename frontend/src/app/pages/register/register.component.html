<div class="register-page">

  <!-- LEFT SIDE (FORM) -->
  <div class="left-panel">
    <div class="form-card">

      <h2>Create Account</h2>
      <p class="subtitle">Fill in your details to get started</p>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name">
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-box">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password">
          <span class="eye-icon" (click)="showPassword = !showPassword">
            {{ showPassword ? '🔓' : '👁️' }}
          </span>
        </div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="password-box">
          <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword">
          <span class="eye-icon" (click)="showConfirmPassword = !showConfirmPassword">
            {{ showConfirmPassword ? '🔓' : '👁️' }}
          </span>
        </div>
      </div>

      <button (click)="register()" [disabled]="loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="loader"></span>
      </button>

      <div class="bottom-link">
        Already have an account?
        <span routerLink="/">Sign In</span>
      </div>

    </div>
  </div>

  <!-- RIGHT SIDE (BRANDING) -->
  <div class="right-panel">
    <div class="brand">
      <img src="/gls_logo.png" alt="GLS Logo">
      <h1>Fees Manager</h1>
      <p>GLS University – Fee Management System</p>
    </div>
  </div>

</div>
